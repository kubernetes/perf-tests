apiVersion: v1
kind: Service
metadata:
  name: {{.Name}}
  labels:
    test: l4lb-load
    size: {{.LBSizeLabel}}
spec:
  {{if .LoadBalancerClass}}
  loadBalancerClass: {{.LoadBalancerClass}}
  {{end}}
  externalTrafficPolicy: {{.ExternalTrafficPolicy}}
  type: LoadBalancer
  selector:
    name: {{.DeploymentBaseName}}-{{.Index}}
  ports:
  - port: 80
    targetPort: 80
