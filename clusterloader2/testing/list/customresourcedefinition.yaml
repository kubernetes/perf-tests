                            type: object
                            additionalProperties:
                              type: string
                          annotations:
                            type: object
                            additionalProperties:
                              type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
              requeueState:
                type: object
                properties:
                  count:
                    type: integer
                    format: int32
                  requeueAt:
                    type: string
                    format: date-time
              payload:
                type: string
