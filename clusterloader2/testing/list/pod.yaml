{{$group := DefaultParam .group .Name}}

apiVersion: v1
kind: Pod
metadata:
  generateName: list-pod-
  labels:
    group: {{$group}}
    app.kubernetes.io/name: "payment-service"
    app.kubernetes.io/instance: "payment-service-primary"
    app.kubernetes.io/version: "v2.1.4"
    app.kubernetes.io/component: "backend"
    app.kubernetes.io/part-of: "ecommerce-platform"
    env: "production"
    track: "canary"
  annotations:
    prometheus.io/scrape: "false"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
    sidecar.istio.io/inject: "false"
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    vault.hashicorp.com/agent-inject: "false"
    vault.hashicorp.com/role: "my-app-db-role"
    fluentbit.io/parser: "json"
    argocd.argoproj.io/hook: "PreSync"
    argocd.argoproj.io/hook-delete-policy: "HookSucceeded"
spec:
  initContainers:
  - name: init-0
    image: {{.ImageRegistry}}/e2e-test-images/agnhost:2.53
    command: ["/bin/sh", "-c", "sleep 1"]
  - name: init-1
    image: {{.ImageRegistry}}/e2e-test-images/agnhost:2.53
    command: ["/bin/sh", "-c", "sleep 1"]
  containers:
  - name: main
    image: {{.ImageRegistry}}/pause:3.9
    env:
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: GOMAXPROCS
      valueFrom:
        resourceFieldRef:
          containerName: main
          resource: limits.cpu
    - name: GOMEMLIMIT
      valueFrom:
        resourceFieldRef:
          containerName: main
          resource: limits.memory
    - name: JAVA_TOOL_OPTIONS
      value: "-XX:MaxRAMPercentage=75.0"
    - name: REDIS_URL
      value: "redis://main:6379/0"
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: NODE_ENV
      value: "prod"
    resources:
      requests:
        cpu: 5m
        memory: 20M
    volumeMounts:
    - mountPath: /var/configmap
      name: configmap
    - mountPath: /var/secret
      name: secret
  - name: sidecar
    image: {{.ImageRegistry}}/pause:3.9
    env:
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: GOMAXPROCS
      valueFrom:
        resourceFieldRef:
          containerName: sidecar
          resource: limits.cpu
    - name: GOMEMLIMIT
      valueFrom:
        resourceFieldRef:
          containerName: sidecar
          resource: limits.memory
    - name: JAVA_TOOL_OPTIONS
      value: "-XX:MaxRAMPercentage=75.0"
    - name: REDIS_URL
      value: "redis://main:6379/0"
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: NODE_ENV
      value: "prod"
    resources:
      requests:
        cpu: 5m
        memory: 20M
  volumes:
  - name: configmap
    configMap:
      name: {{.Name}}
      optional: true
  - name: secret
    secret:
      secretName: {{.Name}}
      optional: true
