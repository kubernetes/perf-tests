## Input params
# Valid actions: "create", "delete"
{{$action := .action}}
{{$RunOnControlPlane := DefaultParam .CL2_INFORMER_RUN_ON_CONTROL_PLANE false}}

steps:
- name: {{$action}} informer role
  phases:
    - namespaceList: [""]
      tuningSet: default
      replicasPerNamespace: 1
      objectBundle:
        - basename: informer
          objectTemplatePath: /modules/informer/namespace.yaml
        - basename: informer
          objectTemplatePath: /modules/informer/role.yaml
        - basename: informer
          objectTemplatePath: /modules/informer/roleBinding.yaml
- name: {{$action}} informer deployment
  phases:
    - namespaceList: ["informer-0"]
      replicasPerNamespace: 1
      tuningSet: default
      objectBundle:
        - basename: informer-watch-list-off
          objectTemplatePath: /modules/informer/deployment.yaml
          templateFillMap:
            EnableWatchListFeature: "false"
    - namespaceList: ["informer-0"]
      replicasPerNamespace: 1
      tuningSet: default
      objectBundle:
        - basename: informer-watch-list-on
          objectTemplatePath: /modules/informer/deployment.yaml
          templateFillMap:
            EnableWatchListFeature: "true"
{{if $RunOnControlPlane}}
    - namespaceList: ["informer-0"]
      replicasPerNamespace: 1
      tuningSet: default
      objectBundle:
        - basename: informer-watch-list-off-control-plane
          objectTemplatePath: /modules/informer/deployment.yaml
          templateFillMap:
            EnableWatchListFeature: "false"
            RunOnControlPlane: "true"
    - namespaceList: ["informer-0"]
      replicasPerNamespace: 1
      tuningSet: default
      objectBundle:
        - basename: informer-watch-list-on-control-plane
          objectTemplatePath: /modules/informer/deployment.yaml
          templateFillMap:
            EnableWatchListFeature: "true"
            RunOnControlPlane: "true"
{{end}}
{{if eq $action "create"}}
- name: Starting measurement for waiting for informer pods to be running
  measurements:
  - Method: WaitForControlledPodsRunning
    Instances:
    - Identifier: WaitForRunningInformerDeployments
      Params:
        apiVersion: apps/v1
        kind: Deployment
    Params:
      action: start
      labelSelector: group = informer
      operationTimeout: 2m
- name: Waiting for informer pods to be running
  measurements:
  - Method: WaitForControlledPodsRunning
    Instances:
    - Identifier: WaitForRunningInformerDeployments
    Params:
      action: gather
{{end}}
