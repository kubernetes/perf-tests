{{$TOLERATION := DefaultParam .CL2_TOLERATION ""}}
{{$Image := DefaultParam .Image "registry.k8s.io/pause:3.9"}}
{{$podPayloadSize := DefaultParam .CL2_JOB_POD_PAYLOAD_SIZE 0}}
{{$RuntimeClassName := DefaultParam .CL2_RUNTIME_CLASS_NAME nil}}
{{$RealisticPod := DefaultParam .CL2_REALISTIC_POD false}}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{.Name}}
  labels:
    group: load
spec:
  backoffLimit: {{.ReplicasMin}}
  manualSelector: true
  parallelism: {{RandIntRange .ReplicasMin .ReplicasMax}}
  completions: {{.Completions}}
  selector:
    matchLabels:
      name: {{.Name}}
  template:
    metadata:
      labels:
        group: load
        name: {{.Name}}
{{if $RealisticPod }}
        app.kubernetes.io/name: "payment-service"
        app.kubernetes.io/instance: "payment-service-primary"
        app.kubernetes.io/version: "v2.1.4"
        app.kubernetes.io/component: "backend"
        app.kubernetes.io/part-of: "ecommerce-platform"
        env: "production"
        track: "canary"
      annotations:
        prometheus.io/scrape: "false"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        sidecar.istio.io/inject: "false"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        vault.hashicorp.com/agent-inject: "false"
        vault.hashicorp.com/role: "my-app-db-role"
        fluentbit.io/parser: "json"
        argocd.argoproj.io/hook: "PreSync"
        argocd.argoproj.io/hook-delete-policy: "HookSucceeded"
{{end}}
    spec:
      {{if $RuntimeClassName}}
      runtimeClassName: {{$RuntimeClassName}}
      {{end}}
{{if $RealisticPod }}
      initContainers:
      - name: init-0
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        command: ["/bin/sh", "-c", "sleep 1"]
      - name: init-1
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        command: ["/bin/sh", "-c", "sleep 1"]
      containers:
      - name: main
        image: registry.k8s.io/pause:3.9
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: main
              resource: limits.cpu
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: main
              resource: limits.memory
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:MaxRAMPercentage=75.0"
        - name: REDIS_URL
          value: "redis://main:6379/0"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: NODE_ENV
          value: "prod"
        resources:
          requests:
            cpu: 5m
            memory: 20M
      - name: sidecar
        image: registry.k8s.io/pause:3.9
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: sidecar
              resource: limits.cpu
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: sidecar
              resource: limits.memory
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:MaxRAMPercentage=75.0"
        - name: REDIS_URL
          value: "redis://main:6379/0"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: NODE_ENV
          value: "prod"
        resources:
          requests:
            cpu: 5m
            memory: 20M
{{else}}
      containers:
      - name: {{.Name}}
        # TODO(#799): We should test the "run-to-completion" workflow and hence don't use pause pods.
        image: {{$Image}}
        env:
        - name: ENV_VAR
          value: {{RandDataWithSeed $podPayloadSize .Name}}
        resources:
          # Keep the CpuRequest/MemoryRequest request equal percentage of 1-core, 4GB node.
          # For now we're setting it to 0.5%.
          requests:
            cpu: 5m
            memory: "20M"
{{end}}
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 1
      # Add not-ready/unreachable tolerations for 15 minutes so that node
      # failure doesn't trigger pod deletion.
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 900
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 900
        {{if $TOLERATION}}
        - key: {{$TOLERATION}}
          operator: Exists
          effect: NoSchedule
        {{end}}
