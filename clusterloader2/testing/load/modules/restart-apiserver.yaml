{{$RESTART_TIMEOUT := DefaultParam .CL2_APISERVER_RESTART_TIMEOUT "10m"}}
{{$RESTART_DOWN_SECONDS := DefaultParam .CL2_APISERVER_RESTART_DOWN_SECONDS 30}}
{{$SETTLE_DURATION := DefaultParam .CL2_APISERVER_RESTART_SETTLE "2m"}}
{{$ENABLE_API_AVAILABILITY_MEASUREMENT := DefaultParam .CL2_ENABLE_API_AVAILABILITY_MEASUREMENT true}}

steps:
{{if $ENABLE_API_AVAILABILITY_MEASUREMENT}}
- name: Pausing APIAvailability measurement
  measurements:
  - Identifier: APIAvailability
    Method: APIAvailability
    Params:
      action: pause
{{end}}

- name: Pausing SystemPodMetrics restart counts
  measurements:
  - Identifier: TestMetrics
    Method: TestMetrics
    Params:
      action: pauseSystemPodMetrics

- name: Start WatchCacheInitializationDuration measurement
  measurements:
  - Identifier: WatchCacheInitializationDuration
    Method: GenericPrometheusQuery
    Params:
      action: start
      metricName: Watch Cache Initialization Duration
      metricVersion: v1
      unit: s
      dimensions:
      - resource
      - instance
      queries:
      - name: InitDuration
        query: sum by (resource, instance) (apiserver_watch_cache_initialization_duration_seconds_sum) / (sum by (resource, instance) (apiserver_watch_cache_initialization_duration_seconds_count) > 0)
      - name: InitCount
        query: sum by (resource, instance) (apiserver_watch_cache_initialization_duration_seconds_count)

- name: Restart kube-apiserver and wait for /readyz
  measurements:
  - Identifier: RestartApiserver
    Method: RestartApiserver
    Params:
      downSeconds: {{$RESTART_DOWN_SECONDS}}
      readyTimeout: {{$RESTART_TIMEOUT}}

- name: Wait for control plane to settle after apiserver restart
  measurements:
  - Identifier: WaitAfterApiserverRestart
    Method: Sleep
    Params:
      duration: {{$SETTLE_DURATION}}

- name: Gather WatchCacheInitializationDuration measurement
  measurements:
  - Identifier: WatchCacheInitializationDuration
    Method: GenericPrometheusQuery
    Params:
      action: gather

- name: Unpausing SystemPodMetrics restart counts
  measurements:
  - Identifier: TestMetrics
    Method: TestMetrics
    Params:
      action: unpauseSystemPodMetrics

{{if $ENABLE_API_AVAILABILITY_MEASUREMENT}}
- name: Unpausing APIAvailability measurement
  measurements:
  - Identifier: APIAvailability
    Method: APIAvailability
    Params:
      action: unpause
{{end}}
