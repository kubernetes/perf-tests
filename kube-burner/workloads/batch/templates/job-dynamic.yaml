# kube-burner/workloads/batch/templates/job-dynamic.yml

apiVersion: batch/v1
kind: Job
metadata:
  name: {{.jobType}}-job-{{ sub .Replica 1 }}
  labels:
    group: test-job
spec:
  parallelism: {{.jobSize}}
  completions: {{.jobSize}}
  completionMode: {{.completionMode}}
  template:
    metadata:
      labels:
        group: test-pod
    spec:
      containers:
      - name: {{.jobType}}-job-{{ sub .Replica 1 }}
        image: gcr.io/k8s-staging-perf-tests/sleep:v0.0.3
        args:
          - {{.sleepDuration}}
      restartPolicy: Never