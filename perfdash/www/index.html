<html lang="en" ng-app="PerfDashApp">
  <head>
    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/angular_material/0.9.4/angular-material.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=RobotoDraft:300,400,500,700,400italic">
    <meta name="viewport" content="initial-scale=1" />
    <style>
      md-option.unavailable {
        opacity: 0.35;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div layout="column" style="margin-top: 20px; width: 80%" offset="10" ng-controller="AppCtrl">
      <md-toolbar layout="row" layout-align="space-around center">
        <h1 class="md-display-2">Performance Dashboard</h1>
        <!-- TODO: Need a better logo here -->
        <a href="https://k8s.io"><img src="k8s_logo.png" style="width:84; height: 84" /></a>
      </md-toolbar>
      <div id="content" class="md-whiteframe-z2" style="padding: 20px;">
        <div style="width: 250px; display: inline-block;">
          <md-input-container>
            <label>Job Name</label>
            <input list="jobNames" ng-model="controller.jobName" ng-change="controller.jobNameChanged()">
            <datalist id="jobNames">
              <option ng-repeat="jobName in controller.jobNames" value="{{jobName}}"></option>
            </datalist>
          </md-input-container>
        </div>
        <div style="width: 300px; display: inline-block;">
          <md-input-container>
            <label>Metric Category</label>
            <input list="metricCategoryNames" ng-model="controller.metricCategoryName" ng-change="controller.metricCategoryNameChanged()" ng-disabled="!controller.jobName">
            <datalist id="metricCategoryNames">
              <option ng-repeat="metricCategoryName in controller.metricCategoryNames" value="{{metricCategoryName}}"></option>
            </datalist>
          </md-input-container>
        </div>
        <div style="width: 300px; display: inline-block;">
          <md-input-container>
            <label>Metric Name</label>
            <input list="metricNames" ng-model="controller.metricName" ng-change="controller.metricNameChanged()" ng-disabled="!controller.metricCategoryName">
            <datalist id="metricNames">
              <option ng-repeat="metricName in controller.metricNames" value="{{metricName}}"></option>
            </datalist>
          </md-input-container>
        </div>
        <div ng-repeat="(name, items) in controller.labels" style="width: 200px; display: inline-block;">
          <md-input-container>
            <label>{{name}}</label>
            <input list="label-{{name}}" ng-model="controller.selectedLabels[name]" ng-change="controller.labelChanged()" ng-disabled="!controller.metricName">
            <datalist id="label-{{name}}">
              <option ng-repeat="item in items" value="{{item}}" ng-disabled="!controller.availableLabels[name][item]"></option>
            </datalist>
          </md-input-container>
        </div>
        <canvas id="line" class="chart chart-line" chart-data="controller.seriesData"
                chart-labels="controller.builds" chart-options="controller.options"
                chart-series="controller.series" chart-click="controller.onClick">
        </canvas>
        <p style="text-align: center">Runs over time</p>
      </div>
      <p style="font-size: x-small; font-style: italic; display: flex; justify-content: space-between;">
        <span>Click a data point to see build logs. CTRL+click anywhere to trim outliers.</span>
        <span>Version: <span id="version"></span></span>
      </p>
      <script>
        fetch('VERSION')
                .then(resp => resp.text())
                .then(version => document.getElementById('version').innerText = version)
      </script>
      <!-- Angular Material Dependencies -->
      <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.15/angular.min.js"></script>
      <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.15/angular-animate.min.js"></script>
      <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.15/angular-aria.min.js"></script>
      <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.15/angular-route.min.js"></script>
      <script src="https://ajax.googleapis.com/ajax/libs/angular_material/0.9.4/angular-material.min.js"></script>

      <script src="Chart.js"></script>
      <script src="angular-chart.js"></script>
      <script src="script.js"></script>
    </div>
  </body>
</html>
