# See https://cloud.google.com/cloud-build/docs/build-config
timeout: 1200s

options:
  substitution_option: ALLOW_LOOSE
  machineType: 'N1_HIGHCPU_8'

steps:
  - name: 'gcr.io/k8s-staging-test-infra/gcb-docker-gcloud@sha256:ff388e0dc16351e96f8464e2e185b74a7578a5ccb7a112cf3393468e59e6e2d2'  # v20260205-38cfa9523f
    entrypoint: bash
    dir: ./util-images
    env:
      - DOCKER_CLI_EXPERIMENTAL=enabled
      - HOME=/root  # for docker buildx
      - WHAT=$_WHAT
    args:
    - -c
    - |
      gcloud auth configure-docker && \
      make push
substitutions:
  # _WHAT will contain the image name to be built and published to the staging registry.
  _WHAT: 'all'